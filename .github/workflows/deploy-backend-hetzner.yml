name: Deploy Backend to Hetzner

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend-hetzner.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare server and write .env
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          port: 22
          username: ${{ secrets.HETZNER_USER }}
          password: ${{ secrets.HETZNER_PASSWORD }}
          script: |
            set -e
            APP_DIR="$HOME/loop-ai"
            SUDO=""
            if [ "$(id -u)" -ne 0 ]; then
              if ! command -v sudo >/dev/null 2>&1; then
                echo "sudo is required for non-root users"
                exit 1
              fi
              SUDO="sudo"
            fi

            # Install Docker + compose plugin if missing (Ubuntu/Debian)
            if ! command -v docker >/dev/null 2>&1; then
              $SUDO apt-get update
              $SUDO apt-get install -y ca-certificates curl gnupg lsb-release

              $SUDO install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | $SUDO gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              $SUDO chmod a+r /etc/apt/keyrings/docker.gpg

              echo \
                "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
                $(lsb_release -cs) stable" | $SUDO tee /etc/apt/sources.list.d/docker.list > /dev/null

              $SUDO apt-get update
              $SUDO apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              $SUDO systemctl enable docker
              $SUDO systemctl start docker
            fi

            mkdir -p "$APP_DIR/backend"

            cat > "$APP_DIR/.env" << 'EOF'
            ${{ secrets.HETZNER_BACKEND_ENV }}
            EOF

      - name: Sync backend files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          port: 22
          username: ${{ secrets.HETZNER_USER }}
          password: ${{ secrets.HETZNER_PASSWORD }}
          source: "backend/*"
          target: "~/loop-ai/backend"

      - name: Deploy backend stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          port: 22
          username: ${{ secrets.HETZNER_USER }}
          password: ${{ secrets.HETZNER_PASSWORD }}
          script: |
            set -e
            cd ~/loop-ai/backend

            DOCKER="docker"
            if ! docker ps >/dev/null 2>&1; then
              DOCKER="sudo docker"
            fi

            $DOCKER compose -f docker-compose.prod.yml down || true
            $DOCKER compose -f docker-compose.prod.yml up -d --build
            $DOCKER image prune -af || true

            $DOCKER compose -f docker-compose.prod.yml ps
            $DOCKER compose -f docker-compose.prod.yml logs api --tail=50
            $DOCKER compose -f docker-compose.prod.yml logs worker --tail=50
