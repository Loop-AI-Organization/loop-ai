name: Deploy Backend to Hetzner

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend-hetzner.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare server and write .env
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          port: ${{ secrets.HETZNER_PORT || '22' }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          passphrase: ${{ secrets.HETZNER_SSH_PASSPHRASE }}
          script: |
            set -e
            APP_DIR="$HOME/loop-ai"

            # Install Docker + compose plugin if missing (Ubuntu/Debian)
            if ! command -v docker >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y ca-certificates curl gnupg lsb-release

              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg

              echo \
                "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
                $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

              sudo apt-get update
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              sudo systemctl enable docker
              sudo systemctl start docker
            fi

            mkdir -p "$APP_DIR/backend"

            cat > "$APP_DIR/.env" << 'EOF'
            ${{ secrets.HETZNER_BACKEND_ENV }}
            EOF

      - name: Sync backend files
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avzr --delete --exclude='.git' --exclude='__pycache__' --exclude='*.pyc' --exclude='.env'
          path: backend/
          remote_path: ~/loop-ai/backend/
          remote_host: ${{ secrets.HETZNER_HOST }}
          remote_port: ${{ secrets.HETZNER_PORT || '22' }}
          remote_user: ${{ secrets.HETZNER_USER }}
          remote_key: ${{ secrets.HETZNER_SSH_KEY }}
          remote_key_pass: ${{ secrets.HETZNER_SSH_PASSPHRASE }}

      - name: Deploy backend stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          port: ${{ secrets.HETZNER_PORT || '22' }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          passphrase: ${{ secrets.HETZNER_SSH_PASSPHRASE }}
          script: |
            set -e
            cd ~/loop-ai/backend

            DOCKER="docker"
            if ! docker ps >/dev/null 2>&1; then
              DOCKER="sudo docker"
            fi

            $DOCKER compose -f docker-compose.prod.yml down || true
            $DOCKER compose -f docker-compose.prod.yml up -d --build
            $DOCKER image prune -af || true

            $DOCKER compose -f docker-compose.prod.yml ps
            $DOCKER compose -f docker-compose.prod.yml logs api --tail=50
            $DOCKER compose -f docker-compose.prod.yml logs worker --tail=50
