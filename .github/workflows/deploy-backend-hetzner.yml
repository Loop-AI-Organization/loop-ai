name: Deploy Backend to Hetzner

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend-hetzner.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required deploy secrets
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HETZNER_BACKEND_ENV: ${{ secrets.HETZNER_BACKEND_ENV }}
        run: |
          set -e
          [ -n "$HETZNER_HOST" ] || { echo "Missing secret: HETZNER_HOST"; exit 1; }
          [ -n "$HETZNER_USER" ] || { echo "Missing secret: HETZNER_USER"; exit 1; }
          [ -n "$HETZNER_SSH_KEY" ] || { echo "Missing secret: HETZNER_SSH_KEY"; exit 1; }
          [ -n "$HETZNER_BACKEND_ENV" ] || { echo "Missing secret: HETZNER_BACKEND_ENV"; exit 1; }

          case "$HETZNER_SSH_KEY" in
            *"BEGIN OPENSSH PRIVATE KEY"*|*"BEGIN RSA PRIVATE KEY"*|*"BEGIN EC PRIVATE KEY"*)
              ;;
            *)
              echo "HETZNER_SSH_KEY is not a valid private key block (did you paste a .pub key?)"
              exit 1
              ;;
          esac

      - name: Setup directories and env file on Hetzner
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          port: 22
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          passphrase: ${{ secrets.HETZNER_SSH_PASSPHRASE }}
          script: |
            set -e
            APP_DIR="$HOME/loop-ai"

            # Install Docker and Compose plugin if missing (Ubuntu/Debian)
            if ! command -v docker >/dev/null 2>&1; then
              apt-get update
              apt-get install -y ca-certificates curl gnupg lsb-release

              install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              chmod a+r /etc/apt/keyrings/docker.gpg

              echo \
                "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
                $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null

              apt-get update
              apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              systemctl enable docker
              systemctl start docker
            fi

            mkdir -p "$APP_DIR/backend"

            cat > "$APP_DIR/.env" << 'EOF'
            ${{ secrets.HETZNER_BACKEND_ENV }}
            EOF

      - name: Sync backend files
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avzr --delete --exclude='.git' --exclude='__pycache__' --exclude='*.pyc' --exclude='.env'
          path: backend/
          remote_path: ~/loop-ai/backend/
          remote_host: ${{ secrets.HETZNER_HOST }}
          remote_port: 22
          remote_user: ${{ secrets.HETZNER_USER }}
          remote_key: ${{ secrets.HETZNER_SSH_KEY }}
          remote_key_pass: ${{ secrets.HETZNER_SSH_PASSPHRASE }}

      - name: Deploy on Hetzner
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          port: 22
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          passphrase: ${{ secrets.HETZNER_SSH_PASSPHRASE }}
          script: |
            set -e
            cd ~/loop-ai/backend

            echo "=== Checking files ==="
            ls -la docker-compose.prod.yml ../.env

            echo "=== Stopping existing containers ==="
            docker compose -f docker-compose.prod.yml down || true

            echo "=== Building and starting containers ==="
            docker compose -f docker-compose.prod.yml up -d --build

            echo "=== Cleaning up old images ==="
            docker image prune -af --force || true

            echo "=== Running containers ==="
            docker compose -f docker-compose.prod.yml ps

            echo "=== Recent logs ==="
            docker compose -f docker-compose.prod.yml logs api --tail=50
            docker compose -f docker-compose.prod.yml logs worker --tail=50
