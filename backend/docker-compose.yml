services:
  backend:
    build: .
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      # Override the localhost Redis URL to use the docker network 'redis' service
      - REDIS_URL=redis://redis:6379
    volumes:
      - .:/app
    depends_on:
      - redis

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
